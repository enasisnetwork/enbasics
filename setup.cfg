


[flake8]
exclude = __pycache__
ignore =
  # missing self annotation
  ANN101,
  # docstring can one line
  D200,
  # blanks after docstring
  D202,
  # too many blank lines
  E303,
  # use of assert detected
  S101,
  # assert should not be used
  SCS108,
  # string literal f-string
  SFS301,
  # newline before operator
  W503,
per-file-ignores =
  # E402    import not top of file
  # I100    incorrect import order
  sphinx/conf.py:I100,E402,



[mypy]
strict = True



[coverage:report]
exclude_lines =
  NOCVR
  NCTrue
  NCFalse
  NCNone
  if TYPE_CHECKING
  except ParserError
